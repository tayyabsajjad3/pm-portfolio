<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM Portfolio Sheet — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,51,102,0.12);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      color: #003366;
      font-size: 1.7rem;
      font-weight: 700;
    }
    .logo p {
      color: #5a6a85;
      font-size: 0.9rem;
      margin-top: 6px;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e7f0;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #5a6a85;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active {
      color: #003366;
      border-bottom-color: #003366;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #003366;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #c0cfe0;
      border-radius: 7px;
      font-size: 0.95rem;
      color: #1e2a3a;
      background: #f8fafd;
      transition: border 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #003366;
      box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
      background: #fff;
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #003366, #0055a5);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }
    .msg.success { background: #e8f5e9; color: #2a7a2a; display: block; }
    .msg.error { background: #fdecea; color: #c0392b; display: block; }
    .msg.info { background: #e8f0fe; color: #003366; display: block; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>PM Portfolio Sheet</h1>
      <p>UNIDO IET/AGR/FSS</p>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Login Panel -->
    <div id="loginPanel" class="panel active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password">
      </div>
      <button class="btn" onclick="handleLogin()">Sign In</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <!-- Signup Panel -->
    <div id="signupPanel" class="panel">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters">
      </div>
      <button class="btn" onclick="handleSignup()">Create Account</button>
      <div id="signupMsg" class="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
